<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>blockasaurus</title>
    <link rel="icon" type="image/svg+xml" href="/ui/blockasaurus-logo-face.svg" />
    <link rel="icon" type="image/x-icon" href="/ui/favicon.ico" />
    <link rel="apple-touch-icon" href="/ui/apple-touch-icon.png" />
    <style>
        /* Chonky tokens — light */
        :root {
            --color-bg: #fff;
            --color-surface: #f8f8f8;
            --color-surface-raised: #f0f0f0;
            --color-border: #ddd;
            --color-border-subtle: #eee;
            --color-text: #111;
            --color-text-muted: #666;
            --color-text-dim: #999;
            --color-primary: #d48f00;
            --color-primary-hover: #b87c00;
            --color-primary-muted: rgba(212, 143, 0, 0.1);
            --color-accent: #215e21;
            --radius: 2px;
            --transition: 150ms ease;
            --font-mono: 'Inconsolata', 'Courier New', monospace;
            --text-xs: 0.72rem;
            --text-sm: 0.8rem;
            --text-base: 0.9rem;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #0a0a0a;
                --color-surface: #111;
                --color-surface-raised: #1a1a1a;
                --color-border: #222;
                --color-border-subtle: #1a1a1a;
                --color-text: #c8c8c8;
                --color-text-muted: #555;
                --color-text-dim: #444;
                --color-primary: #ffaa00;
                --color-primary-hover: #ffbb33;
                --color-primary-muted: rgba(255, 170, 0, 0.12);
                --color-accent: #2a8a2a;
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-mono);
            font-size: var(--text-base);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .landing {
            max-width: 480px;
            width: 100%;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
        }
        @media (prefers-color-scheme: dark) {
            .logo { filter: drop-shadow(0 2px 12px rgba(255,170,0,0.1)); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .tagline {
            color: var(--color-text-muted);
            font-size: var(--text-sm);
            margin-bottom: 2rem;
        }

        .nav-grid {
            display: grid;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .nav-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--color-text);
            transition: background var(--transition), border-color var(--transition);
        }
        .nav-card:hover {
            background: var(--color-surface-raised);
            border-color: var(--color-border);
        }
        .nav-card.primary {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #000;
            font-weight: 600;
        }
        .nav-card.primary:hover {
            background: var(--color-primary-hover);
            border-color: var(--color-primary-hover);
        }

        .nav-icon {
            flex-shrink: 0;
            width: 1.25rem;
            text-align: center;
            font-size: 1rem;
            opacity: 0.7;
        }
        .nav-card.primary .nav-icon { opacity: 1; }

        .nav-label {
            flex: 1;
            text-align: left;
            font-size: var(--text-sm);
        }

        .nav-arrow {
            color: var(--color-text-dim);
            font-size: var(--text-xs);
        }
        .nav-card.primary .nav-arrow { color: rgba(0,0,0,0.4); }

        .version {
            color: var(--color-text-dim);
            font-size: var(--text-xs);
            border-top: 1px dotted var(--color-border);
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="landing">
        <img src="/ui/blockasaurus-logo-face.svg" alt="blockasaurus" class="logo" />
        <h1>blockasaurus</h1>
        <p class="tagline">DNS firewall &amp; ad blocker</p>

        <nav class="nav-grid">
        {{range .Links}}
            <a href="{{.URL}}" class="nav-card{{if .Primary}} primary{{end}}">
                <span class="nav-icon">{{.Icon}}</span>
                <span class="nav-label">{{.Title}}</span>
                <span class="nav-arrow">&rsaquo;</span>
            </a>
        {{end}}
        </nav>

        <p class="version">v{{.Version}} &middot; built {{.BuildTime}}</p>
    </div>
</body>
</html>
