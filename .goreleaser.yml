version: 2

project_name: blockasaurus

before:
  hooks:
    - go mod tidy

builds:
  - id: blockasaurus
    binary: blockasaurus
    env:
      - CGO_ENABLED=0
    ldflags:
      - -w
      - -s
      - -X github.com/0xERR0R/blocky/util.Version=v{{.Version}}
      - -X github.com/0xERR0R/blocky/util.BuildTime={{time "20060102-150405"}}
      - -X github.com/0xERR0R/blocky/util.Architecture={{.Arch}}{{.Arm}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: blockasaurus
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE*
      - README*

nfpms:
  - id: blockasaurus
    package_name: blockasaurus
    vendor: chrissnell
    homepage: https://github.com/chrissnell/blockasaurus
    maintainer: Chris Snell
    description: Fast and lightweight DNS proxy as ad-blocker for local network
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin

dockers:
  - image_templates:
      - "ghcr.io/chrissnell/blockasaurus:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: docker
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
  - image_templates:
      - "ghcr.io/chrissnell/blockasaurus:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: docker
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"

docker_manifests:
  - name_template: "ghcr.io/chrissnell/blockasaurus:{{ .Tag }}"
    image_templates:
      - "ghcr.io/chrissnell/blockasaurus:{{ .Tag }}-amd64"
      - "ghcr.io/chrissnell/blockasaurus:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/chrissnell/blockasaurus:latest"
    image_templates:
      - "ghcr.io/chrissnell/blockasaurus:{{ .Tag }}-amd64"
      - "ghcr.io/chrissnell/blockasaurus:{{ .Tag }}-arm64"

checksum:
  name_template: checksums.txt

release:
  draft: false
  replace_existing_draft: true
  replace_existing_artifacts: true
  target_commitish: '{{ .Commit }}'
  prerelease: auto
  mode: replace

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Build and dependencies"
      regexp: '^.*?build(\([[:word:]]+\))??!?:.+$'
      order: 30
    - title: Misc
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

snapshot:
  version_template: "{{ .Version }}-{{.ShortCommit}}"
