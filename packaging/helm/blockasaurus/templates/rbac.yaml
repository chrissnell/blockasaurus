{{- if and .Values.serviceAccount.create (eq (toString (get (default dict .Values.config.clientGroupEndpoints) "advertiseAddress")) "auto") -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "blockasaurus.fullname" . }}-service-reader
  labels:
    {{- include "blockasaurus.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "blockasaurus.fullname" . }}-service-reader
  labels:
    {{- include "blockasaurus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "blockasaurus.fullname" . }}-service-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "blockasaurus.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
