{{- if and .Values.service.splitUIPort.enabled .Values.ingress.splitUI.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "blockasaurus.fullname" . }}-split-ui
  labels:
    {{- include "blockasaurus.labels" . | nindent 4 }}
  {{- with .Values.ingress.splitUI.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.splitUI.className }}
  ingressClassName: {{ .Values.ingress.splitUI.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.splitUI.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "blockasaurus.fullname" $ }}-split-ui
                port:
                  name: split-ui
          {{- end }}
    {{- end }}
{{- end }}
