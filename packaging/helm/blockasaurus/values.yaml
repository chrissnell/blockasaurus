replicaCount: 1

image:
  repository: ghcr.io/chrissnell/blockasaurus
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Blocky configuration — written to /app/config.yml in the pod.
# See https://0xerr0r.github.io/blocky/ for all options.
config:
  ports:
    dns: 53
    http: 80
  upstreams:
    groups:
      default:
        - https://dns.cloudflare.com/dns-query
        - https://dns.google/dns-query
  # Persistent config store for the web UI
  databasePath: /data/blocky.db

# --- Client Group Endpoints ---
# Per-client-group DNS identification via hostname, path, or EDNS CPE-ID.
# Client groups are created in the web UI; each group gets a DNS-safe slug
# derived from its name (e.g., "Kids Devices" → "kids-devices").
# See docs/client_group_endpoints.md for full details.
#
# Scenario 1: Homelab — no TLS, .local or LAN IP
#   Clients identified by source IP/CIDR, EDNS CPE-ID, or DoH URL path.
#
#   config:
#     clientGroupEndpoints:
#       cpeId: true
#
# Scenario 2: Homelab with self-signed wildcard cert (.local)
#   Adds subdomain-based DoH/DoT.
#
#   tls:
#     enabled: true
#     secretName: blockasaurus-tls
#   config:
#     clientGroupEndpoints:
#       domains:
#         - blockasaurus.local
#       advertiseAddress: auto
#       cpeId: true
#     ports:
#       dns: 53
#       http: 80
#       https: 443
#       tls: 853
#     certFile: /certs/tls.crt
#     keyFile: /certs/tls.key
#   service:
#     dns:
#       dot: true
#       http: true
#       https: true
#
# Scenario 3: Custom domain with wildcard cert (production)
#   Full setup — all protocols on one LoadBalancer IP. With advertiseAddress,
#   blockasaurus auto-creates DNS records from its LB IP — no external DNS
#   records or ingress needed.
#
#   certificate:
#     enabled: true
#     issuerRef:
#       name: letsencrypt-dns01-cloudflare
#       kind: ClusterIssuer
#     dnsNames:                        # BOTH base + wildcard required
#       - dns.example.com              # for https://dns.example.com
#       - "*.dns.example.com"          # for per-group subdomains
#   tls:
#     enabled: true
#     secretName: blockasaurus-tls
#   config:
#     clientGroupEndpoints:
#       domains:
#         - dns.example.com
#       advertiseAddress: auto
#       cpeId: true
#     ports:
#       dns: 53
#       http: 80
#       https: 443
#       tls: 853
#     certFile: /certs/tls.crt
#     keyFile: /certs/tls.key
#   service:
#     dns:
#       externalTrafficPolicy: Local   # preserves client source IPs
#       dot: true
#       http: true
#       https: true
#   For external-facing DoH with a private admin UI, see Scenario 4 below.
#
# Scenario 4: Separate admin and DNS server ports
#   DoH exposed on the LB; admin UI restricted to a separate ClusterIP.
#   Use this when DoH is internet-facing and the web UI should not be.
#
#   config:
#     ports:
#       dns: 53
#       http: 80          # DNS server only (internet-facing)
#       https: 443        # DNS server only (internet-facing)
#       adminPort: 8080   # Web UI, API, metrics (internal)
#       tls: 853
#     certFile: /certs/tls.crt
#     keyFile: /certs/tls.key
#   service:
#     dns:
#       externalTrafficPolicy: Local
#       dot: true
#       http: true        # DoH on the LoadBalancer (no UI)
#       https: true       # DoH on the LoadBalancer (no UI)
#     adminPort:
#       enabled: true     # Admin UI on a separate ClusterIP
#       type: ClusterIP
#       port: 8080
#
#   Note: When adminPort is active, prometheus.io/port should be set to the
#   admin port (e.g., "8080") since /metrics moves there.

# cert-manager Certificate resource — creates a TLS cert automatically.
# Requires cert-manager to be installed in the cluster.
# IMPORTANT: dnsNames must include BOTH the base domain and the wildcard.
# A wildcard cert (*.dns.example.com) does NOT cover the bare domain.
certificate:
  enabled: false
  # issuerRef:
  #   name: letsencrypt-dns01-cloudflare
  #   kind: ClusterIssuer
  # dnsNames:
  #   - dns.example.com         # base domain
  #   - "*.dns.example.com"     # wildcard for per-group subdomains
  # secretName: ""            # defaults to <fullname>-tls
  # commonName: ""
  # duration: 2160h           # 90 days
  # renewBefore: 360h         # 15 days before expiry
  # subject:
  #   organizations:
  #     - My Org
  # privateKey:
  #   algorithm: RSA
  #   size: 2048

# TLS certificate for DoT/DoH/DoQ — mounts a k8s TLS Secret into the pod
tls:
  enabled: false
  secretName: ""          # Name of k8s TLS Secret (must contain tls.crt + tls.key)
  mountPath: /certs       # Where to mount the cert files in the pod

# Persistent volume for the config database
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 256Mi

# DNS service — exposed via LoadBalancer (MetalLB)
service:
  dns:
    enabled: true
    type: LoadBalancer
    port: 53
    # Set to a specific IP if using MetalLB address pools
    loadBalancerIP: ""
    annotations: {}
    #   metallb.universe.tf/address-pool: dns
    dot: false            # Expose DoT port 853/TCP on the LB
    doq: false            # Expose DoQ port 853/UDP on the LB
    http: false           # Expose HTTP (web UI) on the LB
    https: false          # Expose HTTPS (DoH + web UI) on the LB

  # HTTP service — separate ClusterIP for internal access.
  # Not needed if service.dns.http is true (web UI on the LB).
  http:
    enabled: true
    type: ClusterIP
    port: 80

  # Admin port service — serves the web UI, API, and metrics on a separate port
  # from the DNS server endpoint. Use for external-facing deployments where DoH
  # is internet-exposed but the admin UI should remain internal.
  # Requires config.ports.adminPort (or adminPortTLS) to be set.
  # See Scenario 4 above and docs/client_group_endpoints.md for details.
  adminPort:
    enabled: false
    type: ClusterIP
    port: 8080

# Ingress — not needed when using service.dns.http/https on the LB.
# Useful if you don't have a LoadBalancer (e.g., bare metal without MetalLB).
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: blockasaurus.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

  # Admin ingress — exposes the admin UI via a separate ingress.
  # Useful for LAN access to the web UI when DoH is on a LoadBalancer.
  admin:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: blockasaurus.local
        paths:
          - path: /
            pathType: Prefix

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 100

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 100
  capabilities:
    add:
      - NET_BIND_SERVICE
    drop:
      - ALL

resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
