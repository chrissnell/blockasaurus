name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd web/ui && npm install && npx vite build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-binary
          path: dist/blockasaurus_windows_amd64_v1/blockasaurus.exe
          retention-days: 1

  msi:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64-binary
          path: bin

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $binaryPath = (Resolve-Path "bin/blockasaurus.exe").Path
          $configPath = (Resolve-Path "packaging/config/config-windows.yml").Path
          $outFile = "blockasaurus_${version}_Windows_x86_64.msi"
          wix build -acceptEula wix7 -d Version=$version -d BinaryPath=$binaryPath -d ConfigPath=$configPath -o $outFile packaging/wix/blockasaurus.wxs

      - name: Upload MSI to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          gh release upload "${{ github.ref_name }}" "blockasaurus_${VERSION}_Windows_x86_64.msi"
